# Axolotl configuration translated from Unsloth config
base_model: unsloth/Qwen2.5-Coder-32B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

# Dataset configuration
datasets:
  - path: /workspace/sgtr-em-dev/data/finetuning/aesthetic_preferences_unpopular_small_test.jsonl
    type: completion
    train_on_split: train

# Output configuration
output_dir: ./tmp

# Sequence length
sequence_len: 2048
pad_to_sequence_len: false

# LoRA configuration
adapter: lora
lora_model_dir:
lora_r: 32
lora_alpha: 64
lora_dropout: 0.0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_fan_in_fan_out: false
peft_use_rslora: true
peft_use_dora: false

# Training configuration
num_epochs: 1
micro_batch_size: 2
gradient_accumulation_steps: 8
eval_steps:
save_steps: 10000
logging_steps: 1

# Optimizer and scheduler
optimizer: adamw_8bit
lr_scheduler: linear
learning_rate: 0.00001
weight_decay: 0.01
warmup_steps: 5

# Training settings
train_on_inputs: false  # Equivalent to train_on_responses_only=true
group_by_length: false
bf16: auto
fp16: false
tf32: false

# Gradient settings
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# Miscellaneous
seed: 0
strict: false
do_bench_eval: false
wandb_project:
wandb_entity:
wandb_watch:
wandb_run_id:
wandb_log_model:

# Hub settings (for pushing to HuggingFace)
hub_model_id: hf_id/model_name
hub_strategy: every_save
push_to_hub: false  # Set to true when ready to push

# DPO specific (beta parameter from your config)
dpo_beta: 0.1

# Flash attention
flash_attention: true

# Saving
save_safetensors: true
saves_per_epoch: 1

# Validation
val_set_size: 0
eval_sample_packing: false
eval_batch_size:

# Special tokens
special_tokens:
  pad_token: "<|endoftext|>"